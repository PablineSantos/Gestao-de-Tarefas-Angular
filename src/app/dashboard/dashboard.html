<div class="container">

  <div class="toolbar">
    <button pButton (click)="irParaNova()">
      <span pButtonLabel>Nova Tarefa</span>
    </button>

    <button pButton (click)="irParaLista()">
      <span pButtonLabel>Ver Tarefas</span>
    </button>
  </div>

  <div class="grid">

    <p-card class="card" header="Total">
      <h2>{{ total }}</h2>
    </p-card>

    <p-card class="card" header="Pendentes">
      <h2>{{ pendentes }}</h2>
    </p-card>

    <p-card class="card" header="Concluídas">
      <h2>{{ concluidas }}</h2>
    </p-card>

    <p-card class="card" header="Alta">
      <h2>{{ altas }}</h2>
    </p-card>

    <p-card class="card" header="Média">
      <h2>{{ medias }}</h2>
    </p-card>

    <p-card class="card" header="Baixa">
      <h2>{{ baixas }}</h2>
    </p-card>

  </div>

</div>
